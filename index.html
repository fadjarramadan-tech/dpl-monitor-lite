<script>
        // Endpoint SheetDB API Anda
        const API_URL = "https://sheetdb.io/api/v1/z1j8a6iowxmhx";

        let assets = [];
        let bulkSelection = [];
        let filterWilayah = "ALL";
        let currentRole = "NSD"; 

        function triggerNotification(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMessage.textContent = message;
            
            if (type === 'error') {
                toast.className = "fixed top-4 right-4 z-50 flex items-center gap-3 p-4 rounded-xl shadow-lg border text-white transition-all duration-300 transform translate-y-0 opacity-100 bg-red-600 border-red-500";
                toastIcon.innerHTML = `<i data-lucide="alert-triangle" class="w-5 h-5 shrink-0"></i>`;
            } else {
                toast.className = "fixed top-4 right-4 z-50 flex items-center gap-3 p-4 rounded-xl shadow-lg border text-white transition-all duration-300 transform translate-y-0 opacity-100 bg-bni-teal border-teal-700";
                toastIcon.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5 shrink-0"></i>`;
            }
            
            lucide.createIcons();
            
            setTimeout(() => {
                toast.className = "fixed top-4 right-4 z-50 flex items-center gap-3 p-4 rounded-xl shadow-lg border text-white transition-all duration-300 transform translate-y-[-150%] opacity-0";
            }, 3500);
        }

        // --- FUNGSI MERIVASI DATA DARI SHEETDB (GET) ---
        async function loadDataFromAPI() {
            triggerNotification("Memuat data dari Google Sheets...", "success");
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Gagal mengambil data dari server API.");
                const data = await response.json();
                
                // Mapping data dari string SheetDB ke tipe data yang sesuai di aplikasi
                assets = data.map(item => ({
                    id: item.id || item.nomorAset,
                    entity: item.entity || "",
                    unit: item.unit || "",
                    kelas: item.kelas || "",
                    nomorAset: item.nomorAset || "",
                    nib: item.nib || "-",
                    tglPerolehan: item.tglPerolehan || "",
                    aging: parseInt(item.aging) || 0,
                    range: item.range || "",
                    ket1: item.ket1 || "",
                    ket2: item.ket2 || "",
                    ket3: item.ket3 || "",
                    lokasi: item.lokasi || "",
                    wilayah: item.wilayah || "Wilayah Kerja",
                    hargaPerolehan: parseFloat(item.hargaPerolehan) || 0,
                    perusahaan: item.perusahaan || "",
                    jenisAset: item.jenisAset || "Inventaris",
                    statusProyek: item.statusProyek || "",
                    timeline: item.timeline || "",
                    kategoriAkuntansi: item.kategoriAkuntansi || "",
                    keteranganTindakLanjut: item.keteranganTindakLanjut || "",
                    isConfirmed: item.isConfirmed === "true" || item.isConfirmed === true
                }));

                triggerNotification("Data DPL Berhasil Disinkronisasi!");
                refreshAppUI();
            } catch (error) {
                console.error(error);
                triggerNotification("Koneksi API Gagal. Menggunakan data cadangan lokal.", "error");
            }
        }

        // --- FUNGSI UPDATE DATA KE SHEETDB (PUT/PATCH via SheetDB) ---
        async function updateAssetToAPI(id, updatedFields) {
            try {
                // Konversi data boolean/null menjadi string yang aman bagi spreadsheet
                const payload = {
                    statusProyek: updatedFields.statusProyek,
                    timeline: updatedFields.timeline,
                    kategoriAkuntansi: updatedFields.kategoriAkuntansi,
                    keteranganTindakLanjut: updatedFields.keteranganTindakLanjut,
                    isConfirmed: "true"
                };

                const response = await fetch(`${API_URL}/id/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ data: payload })
                });

                if (!response.ok) throw new Error("Gagal menyimpan data ke API.");
                
                // Update state lokal jika API sukses
                assets = assets.map(asset => {
                    if (asset.id === id) {
                        return { ...asset, ...updatedFields, isConfirmed: true };
                    }
                    return asset;
                });

                triggerNotification("Konfirmasi Wilayah Berhasil Tersimpan di Cloud!");
                refreshAppUI();
            } catch (error) {
                console.error(error);
                triggerNotification("Gagal Sinkronisasi Cloud. Coba lagi.", "error");
            }
        }

        function handleRoleChange(role) {
            currentRole = role;
            const alertText = document.getElementById('role-alert-text');
            const alertBanner = document.getElementById('role-alert-banner');
            const navUploadBtn = document.getElementById('btn-nav-upload-csv');
            const sidebarUploadBtn = document.getElementById('btn-sidebar-upload');
            const sidebarRestoreBtn = document.getElementById('btn-sidebar-restore');

            if (currentRole === 'NSD') {
                alertBanner.className = "bg-blue-50 border-l-4 border-blue-500 rounded-xl p-4 mb-6 shadow-sm flex items-center justify-between no-print";
                alertText.innerHTML = "Saat ini Anda menggunakan hak akses penuh <strong>Divisi NSD (Admin)</strong>. Semua fitur diaktifkan.";
                navUploadBtn.classList.remove('hidden');
                navUploadBtn.classList.add('flex');
                sidebarUploadBtn.classList.remove('hidden');
                sidebarRestoreBtn.classList.remove('hidden');
                triggerNotification("Akses admin diaktifkan (Divisi NSD)");
            } else {
                alertBanner.className = "bg-amber-50 border-l-4 border-amber-500 rounded-xl p-4 mb-6 shadow-sm flex items-center justify-between no-print";
                alertText.innerHTML = "Saat ini Anda masuk sebagai <strong>Kantor Wilayah (User)</strong>. Mengonfirmasi progres aset DPL Wilayah Anda.";
                navUploadBtn.classList.remove('flex');
                navUploadBtn.classList.add('hidden');
                sidebarUploadBtn.classList.add('hidden');
                sidebarRestoreBtn.classList.add('hidden');
                triggerNotification("Mode Akses Kantor Wilayah Aktif");
            }
            refreshAppUI();
        }

        function formatIDR(num) {
            return new Intl.NumberFormat('id-ID', {
              style: 'currency',
              currency: 'IDR',
              minimumFractionDigits: 0
            }).format(num);
        }

        function isCritical(asset) {
            if (asset.jenisAset === 'Bangunan' || asset.kelas === '0021') {
              return asset.aging > 360;
            } else {
              return asset.aging > 180;
            }
        }

        function refreshAppUI() {
            calculateMetricsAndProgress();
            populateRegionCards();
            populateRegionDropdown();
            renderLedgerTable();
            renderQuickAttentionTable();
            renderOfficialLetterDraft();
        }

        function calculateMetricsAndProgress() {
            let totalValue = 0;
            let confirmedCount = 0;
            let buildingCriticalValue = 0;
            let buildingCriticalCount = 0;
            let inventoryCriticalValue = 0;
            let inventoryCriticalCount = 0;

            assets.forEach(asset => {
              const val = asset.hargaPerolehan;
              totalValue += val;
              const isCrit = isCritical(asset);

              if (asset.jenisAset === 'Bangunan') {
                if (isCrit) { buildingCriticalCount++; buildingCriticalValue += val; }
              } else {
                if (isCrit) { inventoryCriticalCount++; inventoryCriticalValue += val; }
              }

              if (asset.isConfirmed) confirmedCount++;
            });

            const completionRate = assets.length ? Math.round((confirmedCount / assets.length) * 100) : 0;
            const pendingCount = assets.length - confirmedCount;

            document.getElementById('progress-text').textContent = `${completionRate}% Selesai`;
            document.getElementById('progress-bar').style.width = `${completionRate}%`;
            document.getElementById('completion-text').innerHTML = `<strong>${confirmedCount}</strong> dari <strong>${assets.length}</strong> aset telah dikonfirmasi oleh Wilayah/Cabang.`;
            document.getElementById('pending-items-count').textContent = `${pendingCount} Item`;
            document.getElementById('pending-count-badge').textContent = pendingCount;
            
            document.getElementById('kpi-total-val').textContent = formatIDR(totalValue);
            document.getElementById('kpi-total-count').textContent = assets.length;
            document.getElementById('kpi-building-crit-val').textContent = formatIDR(buildingCriticalValue);
            document.getElementById('kpi-building-crit-count').textContent = buildingCriticalCount;
            document.getElementById('kpi-inventory-crit-val').textContent = formatIDR(inventoryCriticalValue);
            document.getElementById('kpi-inventory-crit-count').textContent = inventoryCriticalCount;
        }

        function populateRegionCards() {
            const metricsMap = {};
            assets.forEach(asset => {
              const w = asset.wilayah || "Wilayah Kerja";
              if (!metricsMap[w]) {
                metricsMap[w] = { totalValue: 0, count: 0, confirmed: 0, critical: 0 };
              }
              metricsMap[w].totalValue += asset.hargaPerolehan;
              metricsMap[w].count += 1;
              if (asset.isConfirmed) metricsMap[w].confirmed += 1;
              if (isCritical(asset)) metricsMap[w].critical += 1;
            });

            const container = document.getElementById('regional-metrics-grid');
            container.innerHTML = "";

            Object.keys(metricsMap).sort().forEach(wName => {
                const reg = metricsMap[wName];
                const percent = Math.round((reg.confirmed / reg.count) * 100);
                
                const card = document.createElement('div');
                const isActive = filterWilayah === wName;
                
                card.className = `p-3 rounded-xl border transition-all cursor-pointer flex flex-col justify-between ${
                  isActive ? 'border-bni-teal bg-teal-50/50 ring-2 ring-bni-teal/20' : 'border-slate-200 bg-slate-50/40 hover:bg-slate-100'
                }`;
                card.onclick = () => selectRegionFilter(wName);

                card.innerHTML = `
                    <div>
                      <div class="flex justify-between items-start gap-2">
                        <span class="font-bold text-xs text-slate-800 truncate block max-w-[130px]">${wName}</span>
                        <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-slate-200 text-slate-750 shrink-0">${reg.count} Aset</span>
                      </div>
                      <span class="text-[11px] font-semibold text-slate-500 block mt-1">${formatIDR(reg.totalValue)}</span>
                    </div>
                    <div class="mt-3 pt-2.5 border-t border-slate-100">
                      <div class="flex justify-between items-center text-[10px] mb-1">
                        <span class="text-slate-500">Konfirmasi (${reg.confirmed}/${reg.count})</span>
                        <span class="font-bold text-bni-teal">${percent}%</span>
                      </div>
                      <div class="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
                        <div class="bg-bni-teal h-1.5 rounded-full" style="width: ${percent}%"></div>
                      </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function populateRegionDropdown() {
            const select = document.getElementById('filter-region-select');
            const currentSelected = select.value;
            const listWilayah = [...new Set(assets.map(a => a.wilayah || "Wilayah Kerja"))].sort();
            
            select.innerHTML = '<option value="ALL">Semua Wilayah</option>';
            listWilayah.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w; opt.textContent = w; select.appendChild(opt);
            });
            select.value = currentSelected;
        }

        function selectRegionFilter(regionName) {
            filterWilayah = filterWilayah === regionName ? 'ALL' : regionName;
            document.getElementById('filter-region-select').value = filterWilayah;
            handleSearchFilterChange();
        }

        function getFilteredAssets() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterJenis = document.getElementById('filter-jenis-select').value;
            const filterUrgency = document.getElementById('filter-urgency-select').value;
            const filterStatus = document.getElementById('filter-status-select').value;
            const filterRegion = document.getElementById('filter-region-select').value;

            if (searchTerm || filterJenis !== 'ALL' || filterUrgency !== 'ALL' || filterStatus !== 'ALL' || filterRegion !== 'ALL') {
                document.getElementById('reset-filters-bar').classList.remove('hidden');
            } else {
                document.getElementById('reset-filters-bar').classList.add('hidden');
            }

            return assets.filter(asset => {
              const matchesSearch = asset.nomorAset.toLowerCase().includes(searchTerm) || asset.ket1.toLowerCase().includes(searchTerm) || asset.lokasi.toLowerCase().includes(searchTerm);
              const matchesJenis = filterJenis === 'ALL' || asset.jenisAset === filterJenis;
              const criticalState = isCritical(asset);
              const matchesUrgency = filterUrgency === 'ALL' || (filterUrgency === 'CRITICAL' && criticalState) || (filterUrgency === 'NORMAL' && !criticalState);
              const matchesConfirmation = filterStatus === 'ALL' || (filterStatus === 'CONFIRMED' && asset.isConfirmed) || (filterStatus === 'PENDING' && !asset.isConfirmed);
              const matchesRegion = filterRegion === 'ALL' || (asset.wilayah || "Wilayah Kerja") === filterRegion;

              return matchesSearch && matchesJenis && matchesUrgency && matchesConfirmation && matchesRegion;
            });
        }

        function handleSearchFilterChange() {
            filterWilayah = document.getElementById('filter-region-select').value;
            populateRegionCards();
            renderLedgerTable();
        }

        function resetAllFilters() {
            document.getElementById('search-input').value = "";
            document.getElementById('filter-jenis-select').value = "ALL";
            document.getElementById('filter-urgency-select').value = "ALL";
            document.getElementById('filter-status-select').value = "ALL";
            document.getElementById('filter-region-select').value = "ALL";
            filterWilayah = "ALL";
            refreshAppUI();
            triggerNotification("Filter di-reset ke default.");
        }

        function activateUrgentFilters() {
            document.getElementById('filter-urgency-select').value = "CRITICAL";
            document.getElementById('filter-status-select').value = "PENDING";
            switchTab('workspace');
            handleSearchFilterChange();
        }

        function renderLedgerTable() {
            const filtered = getFilteredAssets();
            const tbody = document.getElementById('ledger-table-tbody');
            tbody.innerHTML = "";

            document.getElementById('table-results-label').textContent = `Daftar Kerja Monitoring (Ditemukan ${filtered.length} Aset)`;

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colSpan="9" class="py-8 text-center text-slate-400 font-medium">Data kosong atau tidak cocok.</td></tr>`;
                return;
            }

            filtered.forEach(asset => {
                const criticalState = isCritical(asset);
                const isSelected = bulkSelection.includes(asset.id);
                const tr = document.createElement('tr');
                tr.className = `hover:bg-slate-50 transition-all ${asset.isConfirmed ? 'bg-emerald-50/10' : ''}`;
                
                let statusBadge = `<span class="inline-flex items-center gap-1 text-[10px] font-bold text-slate-400 border border-slate-200 px-2 py-1 rounded-lg bg-slate-50"><i data-lucide="clock" class="w-3 h-3"></i> Belum Balas</span>`;

                if (asset.isConfirmed) {
                    let colorClass = "bg-blue-600";
                    if (asset.statusProyek === 'Done') colorClass = "bg-emerald-600";
                    if (asset.statusProyek === 'Cancel') colorClass = "bg-red-600";

                    statusBadge = `
                        <div class="space-y-1">
                            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-[10px] font-bold text-white uppercase ${colorClass}">
                              ${asset.statusProyek}
                            </span>
                        </div>
                    `;
                }

                tr.innerHTML = `
                    <td class="py-4 px-4 text-center">
                        <input type="checkbox" onchange="toggleAssetSelection('${asset.id}')" ${isSelected ? 'checked' : ''} class="rounded text-bni-teal focus:ring-bni-teal">
                    </td>
                    <td class="py-4 px-4 font-bold text-slate-800">${asset.nomorAset}</td>
                    <td class="py-4 px-4">${asset.jenisAset} (Kelas ${asset.kelas})</td>
                    <td class="py-4 px-4 font-semibold text-slate-800">${asset.ket1}<br><span class="text-xs text-slate-400 font-normal">${asset.ket2}</span></td>
                    <td class="py-4 px-4 font-bold text-bni-teal">${asset.wilayah}</td>
                    <td class="py-4 px-4 text-right font-bold ${criticalState ? 'text-red-600' : 'text-slate-700'}">${asset.aging} Hari</td>
                    <td class="py-4 px-4 text-right font-semibold">${formatIDR(asset.hargaPerolehan)}</td>
                    <td class="py-4 px-4">${statusBadge}</td>
                    <td class="py-4 px-4 text-center">
                        <button onclick="openConfirmationModal('${asset.id}')" class="bg-bni-teal hover:bg-bni-navy text-white font-bold py-1.5 px-3 rounded-lg text-xs transition-all shadow-sm">Konfirmasi</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
            updateBulkPanelUI();
        }

        function renderQuickAttentionTable() {
            const tbody = document.getElementById('quick-attention-tbody');
            tbody.innerHTML = "";
            const urgentItems = assets.filter(a => isCritical(a) && !a.isConfirmed).slice(0, 4);

            if (urgentItems.length === 0) {
                tbody.innerHTML = `<tr><td colSpan="7" class="py-6 text-center text-emerald-600 font-bold">Semua aset kritis klir!</td></tr>`;
                return;
            }

            urgentItems.forEach(asset => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50";
                tr.innerHTML = `
                    <td class="py-3 px-4 font-semibold">${asset.nomorAset}</td>
                    <td class="py-3 px-4">${asset.jenisAset}</td>
                    <td class="py-3 px-4 text-slate-700 truncate max-w-xs">${asset.ket1}</td>
                    <td class="py-3 px-4 text-bni-teal font-bold">${asset.wilayah}</td>
                    <td class="py-3 px-4 text-right font-bold text-red-650">${asset.aging} Hari</td>
                    <td class="py-3 px-4 text-right font-semibold">${formatIDR(asset.hargaPerolehan)}</td>
                    <td class="py-3 px-4 text-center">
                      <button onclick="openConfirmationModal('${asset.id}')" class="bg-bni-teal text-white font-bold py-1 px-2.5 rounded text-xs">Konfirmasi</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openConfirmationModal(assetId) {
            const asset = assets.find(a => a.id === assetId);
            if (!asset) return;

            document.getElementById('modal-asset-id').value = asset.id;
            document.getElementById('modal-title').textContent = `Aset No. ${asset.nomorAset}`;
            document.getElementById('modal-desc-ket1').textContent = asset.ket1;
            document.getElementById('modal-desc-ket2').textContent = asset.ket2;
            document.getElementById('modal-desc-harga').textContent = formatIDR(asset.hargaPerolehan);
            document.getElementById('modal-desc-aging').textContent = `${asset.aging} Hari (${asset.jenisAset})`;
            document.getElementById('modal-desc-lokasi').textContent = `${asset.wilayah} (${asset.lokasi})`;
            document.getElementById('modal-desc-vendor').textContent = asset.perusahaan || '-';

            document.getElementById('modal-status-select').value = asset.statusProyek || "";
            document.getElementById('modal-timeline-input').value = asset.timeline || "";
            document.getElementById('modal-accounting-select').value = asset.kategoriAkuntansi || "Kapitalisasi Aset Tetap";
            document.getElementById('modal-tindaklanjut-textarea').value = asset.keteranganTindakLanjut || "";

            handleModalStatusChange(asset.statusProyek);
            document.getElementById('confirmation-modal').classList.remove('hidden');
        }

        function handleModalStatusChange(val) {
            const catInput = document.getElementById('modal-accounting-select');
            const tlInput = document.getElementById('modal-tindaklanjut-textarea');
            const timeInput = document.getElementById('modal-timeline-input');

            if (val === 'Done') {
              catInput.value = 'Kapitalisasi Aset Tetap';
              tlInput.value = 'Segera koordinasi dengan PFA ubah ke Aktiva Tetap.';
              timeInput.disabled = true;
            } else if (val === 'Cancel') {
              catInput.value = 'Beban Opex';
              tlInput.value = 'Proyek drop, dibebankan langsung ke Opex Wilayah.';
              timeInput.disabled = true;
            } else if (val === 'On Going') {
              catInput.value = 'Kapitalisasi Aset Tetap';
              timeInput.disabled = false;
            }
        }

        function closeConfirmationModal() {
            document.getElementById('confirmation-modal').classList.add('hidden');
        }

        // --- INTERSEPSI SUBMIT FORM PINDAH KE API ---
        async function saveModalConfirmation(e) {
            e.preventDefault();
            const id = document.getElementById('modal-asset-id').value;
            const statusProyek = document.getElementById('modal-status-select').value;
            const timeline = document.getElementById('modal-timeline-input').value;
            const kategoriAkuntansi = document.getElementById('modal-accounting-select').value;
            const keteranganTindakLanjut = document.getElementById('modal-tindaklanjut-textarea').value;

            closeConfirmationModal();
            
            // Simpan langsung ke cloud
            await updateAssetToAPI(id, {
                statusProyek, timeline, kategoriAkuntansi, keteranganTindakLanjut
            });
        }

        function toggleAssetSelection(id) {
            if (bulkSelection.includes(id)) { bulkSelection = bulkSelection.filter(item => item !== id); } 
            else { bulkSelection.push(id); }
            updateBulkPanelUI();
        }

        function handleSelectAllToggle() {
            const isChecked = document.getElementById('select-all-checkbox').checked;
            bulkSelection = isChecked ? getFilteredAssets().map(a => a.id) : [];
            renderLedgerTable();
        }

        function updateBulkPanelUI() {
            const panel = document.getElementById('bulk-actions-panel');
            document.getElementById('selected-assets-count').textContent = bulkSelection.length;
            if (bulkSelection.length > 0 && currentRole === 'NSD') panel.classList.remove('hidden');
            else panel.classList.add('hidden');
        }

        function clearBulkSelection() { bulkSelection = []; renderLedgerTable(); }

        // --- MASS UPDATE VIA SHEETDB MULTIPLE REQUESTS ---
        async function handleBulkUpdate(status) {
            if (currentRole !== 'NSD') return;
            triggerNotification("Memproses update massal ke cloud...");
            
            let recommendedCategory = status === 'Cancel' ? 'Beban Opex' : 'Kapitalisasi Aset Tetap';
            
            for (let id of bulkSelection) {
                await fetch(`${API_URL}/id/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: {
                            statusProyek: status,
                            kategoriAkuntansi: recommendedCategory,
                            isConfirmed: "true"
                        }
                    })
                });
            }

            bulkSelection = [];
            triggerNotification("Selesai memperbarui data massal!");
            loadDataFromAPI(); // Muat ulang dari Cloud
        }

        function renderOfficialLetterDraft() {
            const doneAssets = assets.filter(a => a.statusProyek === 'Done');
            const ongoingAssets = assets.filter(a => a.statusProyek === 'On Going');
            const cancelAssets = assets.filter(a => a.statusProyek === 'Cancel');
            const confirmedAssets = assets.filter(a => a.isConfirmed);

            document.getElementById('report-done-count').textContent = doneAssets.length;
            document.getElementById('report-ongoing-count').textContent = ongoingAssets.length;
            document.getElementById('report-cancel-count').textContent = cancelAssets.length;
            document.getElementById('report-confirmed-count').textContent = confirmedAssets.length;

            const rate = assets.length ? Math.round((confirmedAssets.length / assets.length) * 100) : 0;
            document.getElementById('report-rate-badge').textContent = `Progress: ${rate}% Terkonfirmasi`;

            const tbody = document.getElementById('report-attachment-tbody');
            tbody.innerHTML = "";
            assets.forEach(a => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-1 border font-mono">${a.nomorAset}</td>
                    <td class="p-1 border text-center">${a.kelas}</td>
                    <td class="p-1 border">${a.header || a.ket1}</td>
                    <td class="p-1 border text-right">${a.aging} H</td>
                    <td class="p-1 border text-right">${formatIDR(a.hargaPerolehan)}</td>
                    <td class="p-1 border font-bold">${a.statusProyek || "BELUM"}</td>
                    <td class="p-1 border text-xs">${a.keteranganTindakLanjut || "-"}</td>
                    <td class="p-1 border text-xs">${a.kategoriAkuntansi || "-"}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function switchTab(targetTab) {
            document.querySelectorAll('nav button').forEach(btn => {
                btn.className = "px-3 py-2 rounded-lg text-sm font-semibold transition-colors text-slate-600 hover:text-bni-teal hover:bg-slate-50";
            });
            const activeBtn = document.getElementById(`tab-btn-${targetTab}`);
            if (activeBtn) activeBtn.className = "px-3 py-2 rounded-lg text-sm font-semibold bg-bni-lightTeal text-bni-teal";

            ['dashboard', 'workspace', 'report', 'instructions'].forEach(tab => {
                document.getElementById(`tab-content-${tab}`).classList.add('hidden');
            });
            document.getElementById(`tab-content-${targetTab}`).classList.remove('hidden');
        }
